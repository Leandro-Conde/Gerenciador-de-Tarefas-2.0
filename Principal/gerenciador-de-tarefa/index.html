

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shadow" />
</head>
<body>
    
    <header class="head">
        <h1>Gerenciamento de Tarefas</h1>
        <p>organize suas tarefas</p>
        <nav>
            <button id="temaEscuro">
                <p>Fundo</p>
            </button>
        </nav>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Nova tarefa</h2>

            <form id="task">
                <input type="text" id="titulo" placeholder="Título de tarefa" required>
                
                <select id="prioridade">
                    <option value="alta">Alta</option>
                    <option value="media">Média</option>
                    <option value="baixa">Baixa</option>
                </select>
                
                <button type="submit">Adicionar</button>
            </form>

            <div class="filtro">
                <button id="filtroTodas">Todas</button>                
                <button id="filtroPendentes">Pendentes</button>                
                <button id="filtroConcluidas">Concluídas</button>
                <button id="clearCompleted">Limpar Concluidas</button>        
            </div>

            <div id="contador"></div>
        </section>

        <section class="list">
            <h2>Suas tarefas</h2>

            <ul id="task-list">
                <!--tarefas entram aqui-->
            </ul>
        </section>
    </main>

        <footer class="foot">
            <p>Site feito por Leandro Conde utilizando HTML, CSS E JavaScript!</p>
        </footer>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
